<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>barg</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    .landing {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .landing h1 {
      margin-bottom: 3rem;
      font-weight: normal;
    }

    .link-button {
      display: block;
      width: 280px;
      max-width: 90%;
      padding: 1rem;
      margin: 0.5rem 0;
      text-align: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid white;
    }

    .link-button:hover {
      border-color: #FFA500;
    }

    .accent {
      color: #FFA500;
    }
  </style>
</head>

<body>

<div class="container">

  <main class="landing">

    <h1>barg<span class="accent">.</span></h1>

    <a class="link-button" href="https://barg.music">
      website
    </a>

    <a class="link-button" href="https://barg.bandcamp.com">
      bandcamp
    </a>

    <a class="link-button" href="https://youtube.com">
      youtube
    </a>

    <a class="link-button" href="https://instagram.com">
      instagram
    </a>

  </main>

  <footer>
    <p>&copy; 2025 barg musik</p>
  </footer>

</div>

</body>
</html>
