<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>barg</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    .landing {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .landing h1 {
      margin-bottom: 0.25rem;
      font-weight: normal;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 3rem;
      color: #FFA500;
    }

    .link-button {
      display: block;
      width: 280px;
      max-width: 90%;
      padding: 1rem;
      margin: 0.5rem 0;

      background: #ffffff;
      color: #000000;

      text-decoration: none;
      text-align: center;

      border: 1px solid #ffffff;
      box-sizing: border-box;
    }

    .link-button:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <main class="landing">

      <h1>barg</h1>
      <p class="subtitle">indie folk-rock aus hamburg</p>

      <a class="link-button" href="https://bargband.de" target="_blank" rel="noopener noreferrer">
        website
      </a>

      <a class="link-button" href="https://barg.bandcamp.com" target="_blank" rel="noopener noreferrer">
        bandcamp
      </a>

      <a class="link-button" href="https://www.youtube.com/@barg_band" target="_blank" rel="noopener noreferrer">
        youtube
      </a>

      <a class="link-button" href="https://www.instagram.com/barg.band/" target="_blank" rel="noopener noreferrer">
        instagram
      </a>

    </main>

    <footer>
      <p>&copy; 2026 barg musik</p>
    </footer>

  </div>

</body>
</html>
